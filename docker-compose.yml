services:
  db:
    # TimescaleDB HA image: PostgreSQL + timescaledb + pgvector + pgvectorscale + postgis.
    # One container, one database, multiple extensions — no separate DBs on the NAS.
    image: timescale/timescaledb-ha:pg17
    container_name: weather-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weather}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather}
      POSTGRES_DB: ${POSTGRES_DB:-weather}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/home/postgres/pgdata/data
      # init scripts run once, on first initialization of an empty data dir
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather} -d ${POSTGRES_DB:-weather}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    # One-shot, idempotent migration runner. The db/init/*.sql scripts only execute on
    # the FIRST initialization of an empty data dir, so schema changes never reach an
    # already-initialized database (e.g. the NAS). This service applies the pending
    # migrations (03 enrichment, 04 sensor_channels, 05 rain-totals) in order on every `up` and then exits;
    # ingest/grafana wait for it to succeed. Reuses the db image (already present, no extra
    # pull). Safe to re-run: DDL is IF NOT EXISTS and backfills only touch missing rows.
    image: timescale/timescaledb-ha:pg17
    container_name: weather-migrate
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-weather}
    entrypoint: ["psql"]
    command:
      - "-v"
      - "ON_ERROR_STOP=1"
      - "-h"
      - "db"
      - "-U"
      - "${POSTGRES_USER:-weather}"
      - "-d"
      - "${POSTGRES_DB:-weather}"
      - "-f"
      - "/migrations/03-schema-enrichment.sql"
      - "-f"
      - "/migrations/04-sensor-channels.sql"
      - "-f"
      - "/migrations/05-rain-totals.sql"
    volumes:
      - ./db/init:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  ingest:
    build: ./ingest
    container_name: weather-ingest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather}:${POSTGRES_PASSWORD:-weather}@db:5432/${POSTGRES_DB:-weather}
    ports:
      # host 8088 -> container 8000 (host :8000 is used by another container on this NAS).
      # point the GW3000 Custom Server at http://<NAS_IP>:8088/data/report
      - "8088:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:latest
    container_name: weather-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # exposed to the datasource provisioning file (Grafana interpolates $VAR)
      POSTGRES_USER: ${POSTGRES_USER:-weather}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather}
      POSTGRES_DB: ${POSTGRES_DB:-weather}
      # destination for provisioned low-battery alerts (see grafana/provisioning/alerting/).
      # Set to a Discord/Slack/ntfy/Home-Assistant webhook URL. The default is a deliberately
      # unroutable placeholder so alerts still fire/show in the UI without a real endpoint — an
      # EMPTY value would crash Grafana's alerting provisioning, so keep it non-empty.
      BATTERY_ALERT_WEBHOOK: ${BATTERY_ALERT_WEBHOOK:-https://example.invalid/battery-alert}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
  grafana-data:
