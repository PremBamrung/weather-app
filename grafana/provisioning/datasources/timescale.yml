apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb          # fixed uid so provisioned dashboards can reference it
    type: postgres
    access: proxy
    url: db:5432
    user: ${POSTGRES_USER:-weather}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-weather}
    jsonData:
      database: ${POSTGRES_DB:-weather}
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
    isDefault: true
