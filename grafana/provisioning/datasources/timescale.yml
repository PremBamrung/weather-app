apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb          # fixed uid so provisioned dashboards can reference it
    type: postgres
    access: proxy
    url: db:5432
    # Grafana interpolates $VAR from the container env (see docker-compose grafana env).
    # NOTE: Grafana does NOT support ${VAR:-default} bash syntax — plain $VAR only.
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: $POSTGRES_DB
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
    isDefault: true
