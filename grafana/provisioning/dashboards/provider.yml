apiVersion: 1

providers:
  - name: weather
    orgId: 1
    folder: Weather
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # dashboard JSON files are mounted here by docker-compose
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
