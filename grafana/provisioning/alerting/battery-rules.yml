# Provisioned low-battery alert rules (Grafana unified alerting).
#
# Each rule aggregates over the last hour rather than testing a single sample, so a lone noisy
# reading near the threshold can't fire (and the per-channel rules can't flap). The multi-channel
# sensors return ONE ROW PER CHANNEL (a `channel` label + a numeric `metric`), so the alert is
# multi-dimensional: it fires per low channel and the notification names exactly which one is low
# via {{ $labels.channel }} — instead of a count that collapses identity into "a WN31 is low".
#
# Aggregate choice: WS69 and WN31 are 0/1 flags, so max() = "was it ever flagged low this hour".
# WH51 reports a voltage that wobbles near 1.2 V, so avg() smooths it and avoids flapping.
#
# Batteries drain slowly, so a 15m evaluation with a 1h lookback is plenty. Routing: rules carry
# `group: battery`, matched by the notification policy in notification-policies.yml -> the
# `battery-notifier` contact point (contact-points.yml).
apiVersion: 1

groups:
  - orgId: 1
    name: Battery
    folder: Weather
    interval: 15m
    rules:
      - uid: batt-ws69-low
        title: WS69 outdoor array battery low
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels:
          group: battery
          severity: warning
          sensor: ws69
        annotations:
          summary: "WS69 outdoor array battery is LOW (wh65batt=1). Replace the 2×AA backup cells."
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: timescaledb
            model:
              refId: A
              datasource: { type: postgres, uid: timescaledb }
              format: table
              rawSql: >
                SELECT max(wh65_batt) AS metric FROM weather_metrics
                WHERE wh65_batt IS NOT NULL AND time > now() - interval '1 hour'
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: batt-wn31-low
        title: WN31 room sensor battery low
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels:
          group: battery
          severity: warning
          sensor: wn31
        annotations:
          summary: "WN31 room sensor on channel {{ $labels.channel }} reports LOW battery. Replace its 2×AA cells."
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: timescaledb
            model:
              refId: A
              datasource: { type: postgres, uid: timescaledb }
              format: table
              rawSql: >
                SELECT channel::text AS channel, max(batt) AS metric
                FROM sensor_channels
                WHERE sensor_type='wn31' AND batt IS NOT NULL AND time > now() - interval '1 hour'
                GROUP BY channel
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      - uid: batt-wh51-low
        title: WH51 soil sensor battery low
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels:
          group: battery
          severity: warning
          sensor: wh51
        annotations:
          summary: "WH51 soil sensor on channel {{ $labels.channel }} dropped below 1.2 V (hourly avg). Replace its 1×AA cell."
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: timescaledb
            model:
              refId: A
              datasource: { type: postgres, uid: timescaledb }
              format: table
              rawSql: >
                SELECT channel::text AS channel, avg(batt) AS metric
                FROM sensor_channels
                WHERE sensor_type='wh51' AND batt IS NOT NULL AND time > now() - interval '1 hour'
                GROUP BY channel
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              datasource: { type: __expr__, uid: __expr__ }
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1.2] }
